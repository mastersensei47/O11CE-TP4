<!DOCTYPE html>

<head>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
body{ background:#0e0e0e; color:white; overflow-x: hidden; }

/* ===== NAVBAR REDISEÑADA PARA MÓVIL ===== */
.navbar{
  width:100%;
  background: #111;
  position:fixed;
  top:0; left:0; z-index:1000;
  border-bottom: 2px solid #ff0000;
}
.nav-container{
  max-width:1400px;
  margin:auto;
  display:flex;
  flex-direction: column; /* Apilado en móvil */
  align-items:center;
  padding: 10px;
}
.logo{
  font-size:24px; font-weight:bold; color: #fff;
  text-shadow: 0 0 10px #ff0000; text-decoration: none;
  margin-bottom: 10px;
}
.nav-links{ 
  display:flex; 
  gap:8px; 
  justify-content: center;
  width: 100%;
}
.nav-links a{
  color:#fff; text-decoration:none; 
  background: #222;
  padding: 10px; 
  border-radius: 50%; /* Iconos redondos */
  width: 45px; height: 45px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  border: 1px solid #333;
  transition: 0.3s;
}
.nav-links a span { display: none; } /* Ocultar texto siempre en móvil */
.btn-jugar { border-color: #00ff00 !important; }

/* ===== CONTENIDO PRINCIPAL ===== */
main{ 
  margin-top: 130px; /* Espacio para la navbar doble */
  padding: 15px; 
  max-width: 1100px; 
  margin-left: auto; margin-right: auto; 
}

.reproductor-box {
  background: #111; border-radius: 12px; overflow: hidden;
  border: 1px solid #222; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
  margin-bottom: 20px;
}
.video-container { position: relative; padding-top: 56.25%; background: #000; }
.video-container iframe { 
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
}

.info-capitulo { padding: 15px; background: #161616; border-top: 2px solid #ff0000; }
.info-capitulo h1 { font-size: 18px; margin-bottom: 5px; }
.info-capitulo p { font-size: 13px; color: #888; }

/* ===== GRILLA DE CAPÍTULOS ===== */
.titulo-seccion { 
    margin: 20px 0 15px; 
    border-left: 4px solid #ff0000; 
    padding-left: 12px; 
    font-size: 18px;
    text-transform: uppercase; 
}

.grid-capitulos {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 4 columnas fijas en móvil */
  gap: 8px;
}
.cap-btn {
  background: #1b1b1b; border: 1px solid #333; color: white;
  padding: 12px 0; text-align: center; border-radius: 6px;
  cursor: pointer; font-weight: bold; font-size: 13px;
}
.cap-btn.active { background: #ff0000; border-color: white; }

/* AJUSTES PARA PC */
@media(min-width: 769px) {
  .nav-container { flex-direction: row; padding: 12px 20px; }
  .logo { margin-bottom: 0; }
  .nav-links a { border-radius: 8px; width: auto; height: auto; padding: 8px 15px; font-size: 14px; }
  .nav-links a span { display: inline; }
  main { margin-top: 90px; }
  .grid-capitulos { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
}
</style>
</head>

      <a href="https://www.tiktok.com/@mastersensei47" target="_blank" title="TikTok">📱<span>TikTok</span></a>

</nav>

<script>
function cambiarVideo(id, titulo, elemento) {
    document.getElementById('video-drive').src = "https://drive.google.com/file/d/" + id + "/preview";
    document.getElementById('titulo-display').innerText = "O11CE - " + titulo;
    let botones = document.querySelectorAll('.cap-btn');
    botones.forEach(btn => btn.classList.remove('active'));
    elemento.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
