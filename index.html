<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
body{ background:#0a0a0a; color:white; overflow-x: hidden; }

/* ===== NAVBAR ADAPTADA ===== */
.navbar{
  width:100%; background: #111; position:fixed;
  top:0; left:0; z-index:1000; border-bottom: 2px solid #ff0000;
}
.nav-container{
  max-width:1400px; margin:auto; display:flex; 
  flex-direction: column; align-items:center; padding: 10px;
}
.logo{
  font-size:22px; font-weight:bold; color: #fff;
  text-shadow: 0 0 10px #ff0000; text-decoration: none; margin-bottom: 8px;
}
.nav-links{ display:flex; gap:8px; justify-content: center; width: 100%; }
.nav-links a{
  color:#fff; text-decoration:none; background: #222;
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; border: 1px solid #333;
}
.btn-jugar { border-color: #00ff00 !important; }

/* ===== REPRODUCTOR PRO ===== */
main{ margin-top: 130px; padding: 10px; max-width: 900px; margin-left: auto; margin-right: auto; }

.reproductor-box {
  background: #000; border-radius: 8px; overflow: hidden;
  border: 1px solid #333; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
  margin-bottom: 20px;
}
.video-container { position: relative; padding-top: 56.25%; background: #000; }
.video-container iframe { 
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
}

.info-capitulo { padding: 15px; background: #111; border-top: 2px solid #ff0000; }
.info-capitulo h1 { font-size: 17px; color: #fff; }

/* ===== GRILLA DE CAPÍTULOS ===== */
.grid-capitulos {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 15px;
}
.cap-btn {
  background: #1b1b1b; border: 1px solid #333; color: white;
  padding: 12px 0; text-align: center; border-radius: 6px;
  cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s;
}
.cap-btn.active { background: #ff0000; border-color: #fff; box-shadow: 0 0 10px #ff0000; }

@media(min-width: 769px) {
  .nav-container { flex-direction: row; padding: 10px 20px; }
  .logo { margin-bottom: 0; margin-right: 20px; }
  .nav-links { width: auto; }
  .nav-links a { border-radius: 8px; width: auto; height: auto; padding: 8px 12px; font-size: 14px; }
  .nav-links a span { display: inline; margin-left: 5px; }
  main { margin-top: 80px; }
  .grid-capitulos { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
}
</style>
</head>

<script>
function cambiarVideo(id, titulo, elemento) {
    const player = document.getElementById('video-drive');
    
    // Agregamos un timestamp aleatorio al final para evitar que el navegador cargue una versión fallida de la caché
    const cleanUrl = "https://drive.google.com/file/d/" + id + "/preview?t=" + new Date().getTime();
    
    player.src = cleanUrl;
    document.getElementById('titulo-display').innerText = "O11CE - " + titulo;
    
    let botones = document.querySelectorAll('.cap-btn');
    botones.forEach(btn => btn.classList.remove('active'));
    elemento.classList.add('active');
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
