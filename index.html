<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>MS47 - O11CE Nueva Generación</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
body{ background:#0e0e0e; color:white; }

/* ===== NAVBAR RESPONSIVA ===== */
.navbar{
  width:100%;
  background: rgba(17, 17, 17, 0.95);
  position:fixed;
  top:0; left:0; z-index:1000;
  border-bottom: 1px solid #333;
}
.nav-container{
  max-width:1400px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
}
.logo{
  font-size:22px; font-weight:bold; color: #fff;
  text-shadow: 0 0 10px #ff0000; text-decoration: none;
}
.nav-links{ display:flex; gap:8px; align-items: center; }
.nav-links a{
  color:#ccc; text-decoration:none; font-weight:bold; font-size: 12px;
  display: flex; align-items: center; gap: 4px;
  padding: 6px 8px; border-radius: 6px; transition:0.3s;
}
.btn-mas-juegos { background: #333; border: 1px solid #444; }
.btn-jugar { border: 1px solid #00ff00; color: #00ff00 !important; }

/* ===== REPRODUCTOR ===== */
main{ margin-top:80px; padding:15px; max-width:1100px; margin-left:auto; margin-right:auto; }

.reproductor-box {
    background: #111; border-radius: 12px; overflow: hidden;
    border: 1px solid #222; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
    margin-bottom: 20px;
}
.video-container { position: relative; padding-top: 56.25%; background: #000; }
.video-container iframe { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    border: none;
}

.info-capitulo { padding: 15px; background: #161616; border-top: 2px solid #ff0000; }
.info-capitulo h1 { font-size: 18px; margin-bottom: 5px; }
.info-capitulo p { font-size: 13px; color: #888; }

/* ===== GRILLA DE CAPÍTULOS RESPONSIVA ===== */
.titulo-seccion { margin: 15px 0; border-left: 4px solid #ff0000; padding-left: 12px; text-transform: uppercase; font-size: 18px; }
.grid-capitulos {
    display: grid;
    /* Ajuste automático según el ancho del celular */
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px;
    margin-bottom: 30px;
}
.cap-btn {
    background: #1b1b1b; border: 1px solid #333; color: white;
    padding: 12px 5px; text-align: center; border-radius: 6px;
    cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s;
}
.cap-btn:hover { background: #ff0000; }
.cap-btn.active { background: #ff0000; border-color: white; box-shadow: 0 0 10px rgba(255,0,0,0.5); }

/* ===== MEDIA QUERIES PARA CELULARES ===== */
@media(max-width:768px){
  .nav-links span { display: none; } /* Oculta el texto, deja solo los emojis */
  .nav-links a { font-size: 16px; padding: 8px; } /* Agranda el área de clic para el dedo */
  .logo { font-size: 20px; }
  .info-capitulo h1 { font-size: 16px; }
  .grid-capitulos { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); } /* Botones un poco más pequeños para que quepan más */
}

@media(max-width:480px){
  main { padding: 10px; margin-top: 70px; }
  .navbar { padding: 5px 0; }
  .grid-capitulos { gap: 5px; }
  .cap-btn { padding: 10px 2px; font-size: 11px; }
}
</style>
</head>

      <a href="https://www.youtube.com/@mastersensei-47" target="_blank">🎬 <span>YouTube</span></a>
      <a href="https://www.instagram.com/master__sensei47" target="_blank">📸 <span>Instagram</span></a>
      <a href="https://www.tiktok.com/@mastersensei47" target="_blank">📱 <span>TikTok</span></a>
    </div>
  </div>
</nav>

<main>

<script>
function cambiarVideo(id, titulo, elemento) {
    const newSrc = "https://drive.google.com/file/d/" + id + "/preview";
    document.getElementById('video-drive').src = newSrc;
    document.getElementById('titulo-display').innerText = "O11CE Nueva Generación - " + titulo;
    let botones = document.querySelectorAll('.cap-btn');
    botones.forEach(btn => btn.classList.remove('active'));
    elemento.classList.add('active');
    
    // En móvil, sube al video para que el usuario no tenga que hacer scroll manual
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
